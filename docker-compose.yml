version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: restaurant-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: restaurant_db
    volumes:
      - mongodb-data:/data/db
      - ./apps/backend/docker/mongo-init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - restaurant-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    container_name: restaurant-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - restaurant-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 5s
      retries: 3

  mongo-express:
    image: mongo-express:latest
    container_name: restaurant-mongo-express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - restaurant-network
    profiles: ['tools']

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: restaurant-redis-commander
    restart: unless-stopped
    ports:
      - '8082:8081'
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-password}
    depends_on:
      - redis
    networks:
      - restaurant-network
    profiles: ['tools']

volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local

networks:
  restaurant-network:
    driver: bridge
