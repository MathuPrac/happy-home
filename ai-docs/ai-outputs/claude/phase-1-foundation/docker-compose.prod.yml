version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: restaurant-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file: apps/backend/.env
    environment:
      NODE_ENV: production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restaurant-network
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/health']
      interval: 30s
      timeout: 5s
      retries: 3

  website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    container_name: restaurant-website
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: apps/website/.env
    depends_on:
      - backend
    networks:
      - restaurant-network

  admin-dashboard:
    build:
      context: .
      dockerfile: apps/admin-dashboard/Dockerfile
    container_name: restaurant-admin
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file: apps/admin-dashboard/.env
    depends_on:
      - backend
    networks:
      - restaurant-network

  nginx:
    image: nginx:alpine
    container_name: restaurant-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - website
      - admin-dashboard
    networks:
      - restaurant-network

  mongodb:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - mongodb-data:/data/db
    networks:
      - restaurant-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 512mb
    volumes:
      - redis-data:/data
    networks:
      - restaurant-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  mongodb-data:
  redis-data:

networks:
  restaurant-network:
    driver: bridge
